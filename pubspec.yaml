name: pcd_tubes_helm
description: "APD Guard - Sistem Deteksi Keselamatan Kerja Real-time"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  tflite_flutter: ^0.11.0
  image: ^4.1.3
  flutter_isolate: ^2.0.4
  envied: ^0.5.4+1

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  

  # ── Role 1: Auth + Camera ─────────────────────────────────────────────────
  provider: ^6.1.2               # State management (warisan Proyek 4)
  camera: ^0.11.0+2              # Akses kamera + CameraImage stream
  vibration: ^2.0.0              # Feedback vibrasi saat pelanggaran APD

  # ── Role 2: AI / TFLite Pipeline ─────────────────────────────────────────
  tflite_flutter: ^0.10.4        # Inference YOLOv8 .tflite (Edge AI)
  image: ^4.1.3                  # Konversi & resize gambar (PCD pipeline)
  flutter_isolate: ^2.0.4        # Background Isolate untuk inference

  # ── Role 3: Overlay (tidak ada tambahan — pakai CustomPainter bawaan Flutter)

  # ── Role 4: Persistensi ───────────────────────────────────────────────────
  hive: ^2.2.3                   # Local database (offline storage log APD)
  hive_flutter: ^1.1.0           # Integrasi Hive dengan Flutter
  mongo_dart: ^0.10.4            # MongoDB Atlas sync (cloud)
  path_provider: ^2.1.4          # Lokasi direktori Hive di perangkat

  # ── Config ────────────────────────────────────────────────────────────────
  envied: ^0.5.4+1               # Baca .env file (threshold, model path, dll)
  flutter_dotenv: ^5.2.1         # Alternatif .env loader (runtime)

  # ── Role 1: Auth + Camera ─────────────────────────────────────────────────
  provider: ^6.1.2               # State management (warisan Proyek 4)
  camera: ^0.11.0+2              # Akses kamera + CameraImage stream
  vibration: ^2.0.0              # Feedback vibrasi saat pelanggaran APD

  # ── Role 2: AI / TFLite Pipeline ─────────────────────────────────────────
  tflite_flutter: ^0.10.4        # Inference YOLOv8 .tflite (Edge AI)
  image: ^4.1.3                  # Konversi & resize gambar (PCD pipeline)
  flutter_isolate: ^2.0.4        # Background Isolate untuk inference

  # ── Role 3: Overlay (tidak ada tambahan — pakai CustomPainter bawaan Flutter)

  # ── Role 4: Persistensi ───────────────────────────────────────────────────
  hive: ^2.2.3                   # Local database (offline storage log APD)
  hive_flutter: ^1.1.0           # Integrasi Hive dengan Flutter
  mongo_dart: ^0.10.4            # MongoDB Atlas sync (cloud)
  path_provider: ^2.1.4          # Lokasi direktori Hive di perangkat

  # ── Config ────────────────────────────────────────────────────────────────
  envied: ^0.5.4+1               # Baca .env file (threshold, model path, dll)
  flutter_dotenv: ^5.2.1         # Alternatif .env loader (runtime)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  envied_generator: ^0.5.4+1     # Code gen untuk envied
  build_runner: ^2.4.8           # Jalankan: dart run build_runner build
  hive_generator: ^2.0.1         # Code gen untuk Hive TypeAdapter

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/models/apd_yolov8n.tflite
    - assets/labels/apd_labels.txt
    

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
